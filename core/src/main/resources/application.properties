quarkus.application.name=pdf-rag-ingest-core

# --- Backend selection -------------------------------------------------------
# Which backend to use when the tool call does not specify one. "qdrant" or
# "openwebui".
ingest.backend.default=${INGEST_BACKEND:qdrant}

# --- File fetching (shared) --------------------------------------------------
ingest.max-file-bytes=104857600
ingest.fetch.connect-timeout-seconds=10
ingest.fetch.request-timeout-seconds=120

# --- Open WebUI backend ------------------------------------------------------
ingest.openwebui.base-url=${OPEN_WEBUI_BASE_URL:http://localhost:3000}
ingest.openwebui.api-key=${OPEN_WEBUI_API_KEY:}
ingest.openwebui.connect-timeout-seconds=10
ingest.openwebui.request-timeout-seconds=120
ingest.openwebui.poll.initial-ms=200
ingest.openwebui.poll.max-ms=2000

# --- Qdrant backend ----------------------------------------------------------
ingest.qdrant.url=${QDRANT_URL:http://localhost:6333}
ingest.qdrant.api-key=${QDRANT_API_KEY:}
ingest.qdrant.distance=Cosine
ingest.qdrant.connect-timeout-seconds=10
ingest.qdrant.request-timeout-seconds=120
ingest.qdrant.upsert-batch-size=128

# --- Async ingest queue ------------------------------------------------------
# Jobs above the sync threshold get queued for background processing rather
# than blocking the MCP tool call. Mandatory for CPU-only ColPali deployments
# where a 100-page PDF takes minutes; useful insurance everywhere else.
ingest.queue.persistence_path=${INGEST_QUEUE_PATH:${user.home}/.pdf-rag-ingest/queue}
ingest.queue.worker_threads=${INGEST_QUEUE_WORKERS:1}
ingest.queue.sync_threshold_pages=${INGEST_ASYNC_THRESHOLD_PAGES:20}
ingest.queue.max_retries=3
ingest.queue.poll_timeout_ms=1000

# --- Text extraction (Tika) --------------------------------------------------
# Hard cap on extracted text length. Tika defaults to 100_000 chars; bumped to
# 10M so large PDFs don't get silently truncated.
ingest.extract.max-chars=10000000

# --- Chunking ----------------------------------------------------------------
ingest.chunk.size-chars=${INGEST_CHUNK_SIZE_CHARS:1500}
ingest.chunk.overlap-chars=${INGEST_CHUNK_OVERLAP_CHARS:200}

# --- Text-layer classification (drives OCR gating + fusion weighting) --------
# Per-page char-count thresholds from PDFBox text extraction. Below low → 0
# (no usable text layer; scan); below full → 1 (partial); at-or-above full → 2.
ingest.text_quality.threshold_low=${INGEST_TEXT_QUALITY_THRESHOLD_LOW:50}
ingest.text_quality.threshold_full=${INGEST_TEXT_QUALITY_THRESHOLD_FULL:500}

# --- Page image storage (rendered PNGs for ColPali + inspect_page) -----------
# v1 supports only "filesystem". vNext adds an S3-compatible adapter.
ingest.page_store.impl=${INGEST_PAGE_STORE_IMPL:filesystem}
ingest.page_store.root=${INGEST_PAGE_STORE_ROOT:${user.home}/.pdf-rag-ingest/page-images}

# --- Retrieval mode (per-call; tool arg overrides this default) -------------
# When 'auto' (default): use fusion when the KB has a visual index, else text_only.
ingest.retrieval.default_mode=${RETRIEVAL_MODE:auto}

# --- Fusion ------------------------------------------------------------------
ingest.fusion.strategy=${FUSION_STRATEGY:rrf}
ingest.fusion.rrf.k=60
ingest.fusion.weighted.text=0.5
ingest.fusion.weighted.visual=0.5
ingest.fusion.weighted.text_score_floor=1.0
ingest.fusion.weighted.visual_score_floor=50.0

# Pre-fusion list sizes are N × top_k from each pipeline (deeper = more recall
# at fusion time, at the cost of extra ANN work).
ingest.search.n_text_multiplier=4
ingest.search.n_pages_multiplier=2

# Confidence heuristic weights + thresholds. See ConfidenceCalculator.
ingest.confidence.weight_text=0.4
ingest.confidence.weight_visual=0.4
ingest.confidence.weight_agreement=0.2
ingest.confidence.threshold_high=0.7
ingest.confidence.threshold_medium=0.4
ingest.confidence.text_score_floor=1.0
ingest.confidence.visual_score_floor=50.0

# --- Visual index toggle (per-KB; tool arg overrides this default) -----------
# When true, ingest_document with no explicit enable_visual_index flag will
# also run the ColPali side. Set false in deployments without a sidecar.
ingest.visual_index.default_enabled=${INGEST_DEFAULT_VISUAL_INDEX:true}

# --- ColPali sidecar render config -------------------------------------------
ingest.colpali.render-dpi=${COLPALI_RENDER_DPI:150}
ingest.colpali.render-image-type=${COLPALI_RENDER_IMAGE_TYPE:RGB}

# --- ColPali sidecar HTTP client ---------------------------------------------
# The sidecar exposes /info, /embed_pages, /embed_query, /healthz over an
# OpenAI-style JSON API. Run llama.cpp-style on either CPU or GPU; the Java
# side stays model-agnostic via /info.
ingest.colpali.sidecar-url=${COLPALI_SIDECAR_URL:http://localhost:8090}
ingest.colpali.connect-timeout-seconds=10
# Ingest can be slow on CPU sidecars; query stays fast.
ingest.colpali.request-timeout-seconds=300
ingest.colpali.batch-size=${COLPALI_BATCH_SIZE:8}

# --- Embeddings (OpenAI-compatible; default target is llama.cpp's
#     llama-server started with --embeddings) ---------------------------------
# llama-server defaults to :8080, which conflicts with our HTTP transport's
# default port. Either run llama-server with --port 8081 (and leave this as is),
# or override EMBED_BASE_URL here. The /v1 suffix is required (llama-server
# also exposes a non-OpenAI /embedding endpoint we don't use).
ingest.embed.base-url=${EMBED_BASE_URL:http://localhost:8081/v1}
ingest.embed.api-key=${EMBED_API_KEY:}
# llama-server ignores the model field in requests (it serves whichever GGUF
# was loaded at startup), but the OpenAI schema requires a non-empty value.
# Any string works; pick something descriptive for logs.
ingest.embed.model=${EMBED_MODEL:bge-large-en-v1.5}
ingest.embed.batch-size=${EMBED_BATCH_SIZE:64}
ingest.embed.connect-timeout-seconds=10
ingest.embed.request-timeout-seconds=120
